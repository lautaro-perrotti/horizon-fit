<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Enable mod_rewrite for WordPress
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Browser cache
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html "access plus 1 minute"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType text/javascript "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/png "access plus 1 month"
        ExpiresByType image/gif "access plus 1 month"
        ExpiresByType application/json "access plus 1 minute"
    </IfModule>

    # CORS: el SPA (:8088) consume datos/imágenes de WordPress (:8089) y el
    # origin varía por entorno (localhost o IP de la VPS). El contenido es
    # público, así que permitimos cualquier origin. Requiere mod_headers
    # (se habilita en el entrypoint).
    <IfModule mod_headers.c>
        Header set Access-Control-Allow-Origin "*"
        Header set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
        Header set Access-Control-Allow-Headers "Content-Type, Authorization"
        Header set Access-Control-Max-Age "86400"
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
