<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Enable mod_rewrite for WordPress
    <IfModule mod_rewrite.c>
        RewriteEngine On
    </IfModule>

    # Gzip compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Browser cache
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/html "access plus 0 seconds"
        ExpiresByType text/css "access plus 0 seconds"
        ExpiresByType text/javascript "access plus 0 seconds"
        ExpiresByType application/javascript "access plus 0 seconds"
        ExpiresByType image/jpeg "access plus 0 seconds"
        ExpiresByType image/png "access plus 0 seconds"
        ExpiresByType image/gif "access plus 0 seconds"
        ExpiresByType image/webp "access plus 0 seconds"
        ExpiresByType image/svg+xml "access plus 0 seconds"
        ExpiresByType font/woff "access plus 0 seconds"
        ExpiresByType font/woff2 "access plus 0 seconds"
        ExpiresByType application/json "access plus 0 seconds"
    </IfModule>

    <FilesMatch "\.(?:html|css|js|json|jpe?g|png|gif|webp|svg|ico|woff2?|ttf|otf)$">
        Header set Cache-Control "no-cache, no-store, must-revalidate, max-age=0"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </FilesMatch>

    # CORS: el SPA (:8088) consume datos/imágenes de WordPress (:8089) y el
    # origin varía por entorno (localhost o IP de la VPS). El contenido es
    # público, así que permitimos cualquier origin. Requiere mod_headers
    # (se habilita en el entrypoint).
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
