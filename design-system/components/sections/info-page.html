<section class="hf-info-page" data-info-page hidden role="main" style="box-sizing:border-box;min-height:calc(100svh - var(--nav-h) - var(--announce-h));padding:88px 16px 32px;padding-top:88px !important;background:var(--bg);overflow:hidden;">
  <div style="box-sizing:border-box;width:min(880px,100%);margin:0 auto;">
    <p data-info-kicker style="margin:0 0 12px;color:var(--hf-primary);font-size:12px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;">Ayuda</p>
    <h1 data-info-title style="max-width:100%;margin:0 0 24px;font-size:20px;font-weight:800;letter-spacing:-.055em;line-height:1.08;overflow-wrap:break-word;color:#222 !important;"></h1>
    <div data-info-content style="font-size:16px;line-height:1.7;color:var(--muted);"></div>
  </div>
</section>
