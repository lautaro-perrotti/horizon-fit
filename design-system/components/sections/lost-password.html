<section class="hf-account-view hf-account-view--lost-password" data-lost-password-page hidden role="main" aria-label="Recuperar contraseña">
  <div class="hf-account-view__shell">
    <div class="hf-account-view__intro">
      <p class="hf-account-view__kicker">Horizon Fit</p>
      <h1 class="hf-account-view__title">Recuperar contraseña</h1>
      <p class="hf-account-view__lead">
        Te enviamos un enlace para restaurar el acceso sin salir de 8088.
      </p>
    </div>

    <div class="hf-account-view__grid">
      <form class="hf-account-view__panel hf-account-view__login" data-lost-password-form>
        <div class="hf-account-view__panel-head">
          <span class="hf-account-view__panel-kicker">Acceso</span>
          <strong class="hf-account-view__panel-title">Recibir enlace</strong>
        </div>

        <label class="hf-account-view__field">
          <span>Usuario o email</span>
          <input type="text" name="user_login" autocomplete="username" required>
        </label>

        <button class="btn btn--primary hf-account-view__submit" data-lost-password-submit type="submit">Enviar enlace</button>
        <p class="hf-account-view__status" data-lost-password-status></p>
        <a class="hf-account-view__back" data-lost-password-login href="/my-account/">Volver al login</a>
      </form>
    </div>
  </div>
</section>
