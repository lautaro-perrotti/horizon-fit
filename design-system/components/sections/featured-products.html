<style>
  .section--featured-products {
    background: var(--surface);
    padding-bottom: 0;
  }

  .hf-product-scroll-shell {
    position: relative;
    overflow: hidden;
  }

  .hf-product-grid--h-scroll {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: minmax(280px, 1fr);
    gap: var(--s-3);
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 0;
  }

  .hf-product-grid--h-scroll.hide-scrollbar {
    scrollbar-width: none;
  }

  .hf-product-grid--h-scroll.hide-scrollbar::-webkit-scrollbar {
    display: none;
  }

  .hf-product-item {
    display: flex;
    flex-direction: column;
    gap: var(--s-2);
  }

  .hf-product-item__link {
    text-decoration: none;
    color: inherit;
  }

  .hf-product-item__media {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    border-radius: var(--radius-sm);
    background: var(--surface-secondary);
  }

  .hf-product-item__badge {
    position: absolute;
    top: var(--s-2);
    right: var(--s-2);
    background: var(--alert);
    color: white;
    padding: var(--s-1) var(--s-2);
    border-radius: var(--radius-xs);
    font-size: 0.75rem;
    font-weight: 600;
    z-index: 2;
  }

  .hf-product-item__slider {
    position: relative;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-areas: "stack";
  }

  .hf-product-item__slide {
    grid-area: stack;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .hf-product-item__slide.is-active {
    opacity: 1;
  }

  .hf-product-item__slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hf-product-item__dots {
    position: absolute;
    bottom: var(--s-2);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: var(--s-1);
    z-index: 3;
  }

  .hf-product-item__dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.6);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .hf-product-item__dot.is-active {
    background: white;
  }

  .hf-product-item__body {
    display: flex;
    flex-direction: column;
    gap: var(--s-1);
  }

  .hf-product-item__sizes {
    display: flex;
    gap: var(--s-1);
  }

  .hf-product-item__size {
    padding: var(--s-1) var(--s-2);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    border-radius: var(--radius-xs);
    font-size: 0.875rem;
    transition: all 0.2s ease;
  }

  .hf-product-item__size:hover {
    border-color: var(--primary);
  }

  .hf-product-item__size[aria-pressed="true"] {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .hf-product-item__title {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.3;
    margin: 0;
  }

  .hf-product-item__pricing {
    display: flex;
    flex-direction: column;
    gap: var(--s-1);
  }

  .hf-product-item__price-row {
    display: flex;
    gap: var(--s-2);
    align-items: baseline;
  }

  .hf-product-item__price {
    font-size: 1rem;
    font-weight: 600;
  }

  .hf-product-item__installments,
  .hf-product-item__transfer {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin: 0;
  }

  .hf-carousel__nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: all 0.2s ease;
  }

  .hf-carousel__nav:hover:not(:disabled) {
    border-color: var(--primary);
    color: var(--primary);
  }

  .hf-carousel__nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .hf-carousel__nav--prev {
    left: var(--s-2);
  }

  .hf-carousel__nav--next {
    right: var(--s-2);
  }
</style>

<section class="section section--featured-products">
  <div class="container section__head">
    <p class="section__eyebrow">Favoritos</p>
    <h2>Productos destacados</h2>
  </div>

  <div class="hf-product-scroll-shell" data-grid-shell="productGrid1">
    <div style="padding: 0 var(--s-4);">
      <div id="productGrid1" class="hf-product-grid--h-scroll hide-scrollbar">
        <!-- PRODUCTOS SE RENDERIZAN AQUÍ DINÁMICAMENTE -->
      </div>
    </div>

    <button class="hf-carousel__nav hf-carousel__nav--prev" type="button" data-dir="-1" aria-label="Anterior" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </button>

    <button class="hf-carousel__nav hf-carousel__nav--next" type="button" data-dir="1" aria-label="Siguiente">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18l6-6-6-6" />
      </svg>
    </button>
  </div>
</section>
