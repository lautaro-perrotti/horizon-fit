<section class="hf-video-hero hf-video-hero--full" data-hf="video-hero"
    data-offset-selectors="header.nav,#topMarquee">
    <video id="heroVideo" class="hf-video-hero__media hf-video-hero__video" autoplay muted loop playsinline
      preload="auto" src="assets/hero-video-desktop.mp4" data-mobile="assets/hero-video-mobile.mp4" data-desktop="assets/hero-video-desktop.mp4">
    </video>
    <div class="hf-video-hero__overlay hf-video-hero__overlay--gradient"></div>
    <div class="hf-video-hero__content">
      <span class="badge badge--primary hf-video-hero__badge"
        style="margin-bottom: 24px; padding: 10px 20px; font-size: 14px;">NUEVA COLECCIÓN</span>
    </div>
  </section>

<script>
(function() {
  const video = document.getElementById('heroVideo');
  if (!video) return;

  const setVideoSrc = () => {
    const isMobile = window.innerWidth <= 768;
    const src = isMobile ? video.getAttribute('data-mobile') : video.getAttribute('data-desktop');
    if (video.src !== src) {
      video.src = src;
      video.load();
    }
  };

  setVideoSrc();
  window.addEventListener('resize', setVideoSrc);
})();
</script>
