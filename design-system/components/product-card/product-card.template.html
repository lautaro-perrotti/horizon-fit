<article class="hf-product-item hf-product-item--slider">
  <div class="hf-product-item__media">
    {{badge}}
    <div class="hf-product-item__slider" data-slider>
      {{slides}}
    </div>
    <div class="hf-product-item__dots">
      {{dots}}
    </div>
  </div>
  <div class="hf-product-item__body">
    <div class="hf-product-item__sizes">
      <button class="hf-product-item__size" aria-pressed="false">S</button>
      <button class="hf-product-item__size" aria-pressed="false">M</button>
      <button class="hf-product-item__size" aria-pressed="false">L</button>
    </div>
    <h3 class="hf-product-item__title"><a href="{{permalink}}">{{name}}</a></h3>
    <div class="hf-product-item__pricing">
      <div class="hf-product-item__price-row">
        <span class="hf-product-item__price">{{priceText}} ARS</span>
        {{priceOriginal}}
      </div>
      <p class="hf-product-item__installments">6 cuotas de: <a href="{{permalink}}" class="hf-product-item__installments-link">{{installmentsText}}</a></p>
      <p class="hf-product-item__transfer">{{transferText}} <span class="hf-product-item__transfer-label">con Transferencia</span></p>
    </div>
  </div>
</article>
