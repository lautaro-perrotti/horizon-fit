<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Producto | Horizon Fit</title>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search || '');
      var slug = params.get('slug') || params.get('product') || '';
      if (slug) {
        window.location.replace('/producto/' + encodeURIComponent(slug) + '/');
        return;
      }
      window.location.replace('/coleccion/');
    })();
  </script>
</head>
<body>
  <p>Redirigiendo al producto...</p>
</body>
</html>
