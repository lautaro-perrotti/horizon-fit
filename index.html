  <style>
    /******************************************************************
        HORIZON FIT — DESIGN SYSTEM (single file)
        - Token-first via CSS variables
        - Vanilla JS components (modal, drawer, tabs, accordion, dropdown, toast, tooltip)
        - Ecommerce-ready examples
      ******************************************************************/

    @font-face {
      font-family: 'BlauerNue';
      src: url('./TIPOGRAFIAS/BLAUERNUE-REGULAR.OTF') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'BlauerNue';
      src: url('./TIPOGRAFIAS/BLAUERNUE-BOLD.OTF') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'BlauerNue';
      src: url('./TIPOGRAFIAS/BLAUERNUE-MEDIUM.OTF') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'BlauerNue';
      src: url('./TIPOGRAFIAS/BLAUERNUE-HEAVY.OTF') format('opentype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'ArchivoMenu';
      src: url('./TIPOGRAFIAS/ARCHIVO-MEDIUM.OTF') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    /* -----------------------------
        1) TOKENS (desde Identikit)
        Paleta: #F1F2F6 #758AFD #FEECD4 #FF5E32 #CB4A00 #B6CF50 #406915 #4B0E26 #4561FC #27187D #000000 #D5C5B5
      ------------------------------*/
    :root {
      /* Colors */
      --hf-black: #000000;
      --hf-white: #F1F2F6;

      --hf-primary: #35006d;
      --hf-primary-700: #1a1054;

      --hf-accent: #758AFD;
      --hf-accent-700: #4561FC;

      --hf-warm: #FEECD4;
      --hf-earth: #D5C5B5;

      --hf-green: #B6CF50;
      --hf-green-700: #406915;

      --hf-purple: #4B0E26;
      --hf-indigo: #27187D;

      /* Brand (bolsas, etiquetas) */
      --hf-brand-coral: #ED562D;
      --hf-brand-indigo: #27187D;

      /* Legacy orange (anterior primario) */
      --hf-orange: #FF5E32;
      --hf-orange-700: #CB4A00;

      /* Semantic */
      --bg: #FBF3E8;
      --surface: #FFF9F2;
      --surface-2: #F7EEE4;
      --text: #0b0b0f;
      --muted: rgba(11, 11, 15, .66);
      --border: rgba(11, 11, 15, .12);
      --shadow: 0 12px 40px rgba(0, 0, 0, .10);

      --focus: 0 0 0 3px rgba(117, 138, 253, .35);

      /* Typography */
      --font-sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      /* Type scale */
      --h1: clamp(28px, 3.2vw, 44px);
      --h2: clamp(22px, 2.2vw, 32px);
      --h3: 20px;
      --p: 16px;
      --small: 13px;

      /* Spacing */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-7: 32px;
      --s-8: 40px;
      --s-9: 56px;
      --s-10: 72px;

      /* Radius */
      --r-1: 10px;
      --r-2: 14px;
      --r-3: 18px;
      --r-pill: 999px;

      /* Motion */
      --ease: cubic-bezier(.4, 0, .2, 1);
      --fast: 150ms;
      --med: 240ms;
      --slow: 380ms;

      /* Layout */
      --container: 1180px;
      --page-gutter: clamp(16px, 2.4vw, 44px);
      --nav-h: 64px;
      --announce-h: 36px;
    }

    /* Dark mode */
    [data-theme="dark"] {
      --bg: #0b0b0f;
      --surface: #121218;
      --surface-2: #171722;
      --text: #f2f3f6;
      --muted: rgba(242, 243, 246, .70);
      --border: rgba(242, 243, 246, .14);
      --shadow: 0 18px 60px rgba(0, 0, 0, .55);
      --focus: 0 0 0 3px rgba(255, 94, 50, .25);
    }

    /* -----------------------------
        2) BASE / RESET
      ------------------------------*/
    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      max-width: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-top: calc(var(--nav-h) + var(--announce-h));
    }

    #hfPageBuilderRoot {
      flex: 1 0 auto;
      width: 100%;
      min-height: calc(100vh - (var(--nav-h) + var(--announce-h)));
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    p {
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: none;
      margin-inline: auto;
      padding-inline: var(--page-gutter);
    }

    .grid {
      display: grid;
      gap: var(--s-6);
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    @media (max-width: 980px) {

      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .section--featured-products {
        padding-top: 0px !important;
        padding-bottom: 0 !important;
      }

      .hf-section-head {
        padding-top: 32px !important;
        margin-bottom: 32px !important;
      }
    }

    .h1 {
      font-size: var(--h1);
      letter-spacing: -.02em;
      margin: 48px 0 16px;
    }

    .h2 {
      font-size: var(--h2);
      letter-spacing: -.02em;
      margin: 48px 0 16px;
    }

    .h3 {
      font-size: var(--h3);
      margin: 48px 0 16px;
    }

    .p {
      font-size: var(--p);
      color: var(--muted);
      margin: 0;
    }

    .small {
      font-size: var(--small);
      color: var(--muted);
    }

    .mono {
      font-family: var(--font-mono);
    }

    h1,
    h2,
    h3,
    .h1,
    .h2,
    .h3,
    .hf-product-item__title,
    .hf-set-desktop-slider__title,
    .hf-category-card__title,
    .trust-item__title,
    .hf-social-strip__title {
      font-family: 'BlauerNue', var(--font-sans) !important;
      font-weight: 400 !important;
      color: var(--hf-primary) !important;
      text-transform: uppercase;
      letter-spacing: 0.04em !important;
    }

    .hf-product-item__title {
      color: #222 !important;
    }

    .hf-style-tile__title {
      color: #222 !important;
    }

    .footer__brand-title {
      color: #fff !important;
    }

    @media (min-width: 1101px) {
      .hf-style-tile__title {
        color: #fff !important;
        font-size: clamp(20px, 1.6vw, 28px) !important;
        line-height: 1.02 !important;
      }
    }

    .hf-section-head__title h2,
    .hf-set-desktop-slider__head h2,
    .hf-set-mobile-carousel__head h2,
    .hf-categories__head h2,
    .hf-style-edit__head h2 {
      color: #222 !important;
      font-size: clamp(22px, 2.6vw, 32px) !important;
      line-height: 1.1 !important;
      letter-spacing: 0.04em !important;
    }

    .hf-section-head__title h2,
    .hf-set-desktop-slider__head h2,
    .hf-set-mobile-carousel__head h2,
    .hf-categories__head h2,
    .hf-style-edit__head h2 {
      font-weight: 400 !important;
    }

    .hf-set-desktop-slider__title {
      font-size: clamp(20px, 1.8vw, 26px) !important;
      line-height: 1.05 !important;
    }

    .hf-category-card__title {
      font-size: clamp(18px, 1.5vw, 24px) !important;
      color: #fff !important;
      line-height: 1.05 !important;
    }

    .hf-social-strip__title {
      font-size: clamp(24px, 3vw, 36px) !important;
      line-height: 1.05 !important;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(10px);
    }

    .kbd {
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
    }

    /* -----------------------------
        3) NAVBAR + HERO (banner grande)
      ------------------------------*/
    .nav {
      position: fixed;
      top: var(--announce-h);
      left: 0;
      right: 0;
      z-index: 120;
      background: var(--surface);
      backdrop-filter: none;
      border-bottom: 1px solid var(--border);
      transition: background var(--med) var(--ease), border-color var(--med) var(--ease), backdrop-filter var(--med) var(--ease), box-shadow var(--med) var(--ease);
    }

    .nav.is-scrolled {
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      backdrop-filter: blur(14px);
      border-bottom-color: var(--border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
    }

    .hf-marquee--fixed {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 130;
    }

    /* Keep marquee clearly visible above navbar */
    .hf-marquee {
      background: #320a5c;
      color: var(--hf-white);
      min-height: var(--announce-h);
      display: flex;
      align-items: center;
    }

    .nav__inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px var(--page-gutter);
      gap: var(--s-4);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: .02em;
      text-decoration: none;
      color: var(--hf-primary);
      flex: 1 1 auto;
      justify-content: center;
    }

    .brand__isotipo {
      height: 28px;
      width: auto;
    }

    .brand__logotipo {
      height: 16px;
      width: auto;
      margin-left: 10px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: radial-gradient(circle at 30% 30%, var(--hf-accent), var(--hf-indigo));
      box-shadow: 0 8px 18px rgba(39, 24, 125, .25);
    }

    .nav__actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav__links a {
      padding: 8px 10px;
      border-radius: 10px;
      color: var(--muted);
    }

    .nav__links a:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .nav__left {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      gap: 0;
    }

    .nav__hamburger {
      padding: 8px;
      border-radius: 8px;
      color: var(--hf-primary);
    }

    .nav__hamburger svg {
      display: block;
    }

    .nav__icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-2);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--hf-primary);
      transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
    }

    .nav__icon-btn:hover {
      background: var(--surface-2);
    }

    .nav__icon-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Desktop: ocultar search mobile */
    .nav__icon-btn--mobile-left {
      display: none;
    }

    .nav__icon-btn--desktop {
      display: flex;
    }

    /* Mobile navbar */
    @media (max-width: 768px) {
      body {
        padding-top: var(--announce-h);
      }

      .nav__inner {
        padding: 10px var(--page-gutter);
      }

      .nav {
        background: var(--surface);
        backdrop-filter: none;
        border-bottom-color: var(--border);
        box-shadow: none;
      }

      .nav__icon-btn--mobile-left {
        display: flex;
      }

      .nav__icon-btn--desktop {
        display: none;
      }

      .brand {
        position: relative;
        min-height: 24px;
      }

      .brand__isotipo {
        height: 24px;
        opacity: 0;
        /* mobile must start with logotipo visible */
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        transition: opacity 0.4s ease;
      }

      .brand__logotipo {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        height: 14px;
        margin-left: 0;
        opacity: 1;
        transition: opacity 0.4s ease;
      }

      /* Alternar logos en mobile */
      .brand__isotipo.is-visible {
        opacity: 1;
      }

      .brand__logotipo.is-hidden {
        opacity: 0;
      }
    }

    .hero {
      padding: var(--s-10) 0 var(--s-9);
    }

    .hero__wrap {
      display: grid;
      grid-template-columns: 1.15fr .85fr;
      gap: var(--s-7);
      align-items: stretch;
    }

    .heroCard {
      border: 1px solid var(--border);
      border-radius: var(--r-3);
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .heroBanner {
      min-height: 360px;
      background:
        radial-gradient(1400px 380px at 10% 30%, rgba(255, 94, 50, .35), transparent 60%),
        radial-gradient(1000px 360px at 70% 10%, rgba(117, 138, 253, .28), transparent 55%),
        linear-gradient(180deg, color-mix(in srgb, var(--hf-warm) 35%, transparent), transparent 55%),
        linear-gradient(135deg, var(--surface), var(--surface-2));
      padding: var(--s-8);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .heroMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .heroTitle {
      margin-top: var(--s-5);
    }

    .heroTitle .h1 {
      margin-bottom: var(--s-2);
    }

    .heroCTA {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: var(--s-5);
    }

    .heroSide {
      display: flex;
      flex-direction: column;
      gap: var(--s-6);
    }

    /* -----------------------------
        4) COMPONENT PRIMITIVES
      ------------------------------*/
    .card {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: var(--r-2);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .06);
    }

    .card__hd {
      padding: var(--s-5) var(--s-5) 0;
    }

    .card__bd {
      padding: var(--s-5);
    }

    .card__ft {
      padding: 0 var(--s-5) var(--s-5);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: var(--s-4) 0;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--s-3);
      align-items: center;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
    }

    .spacer {
      height: var(--s-3);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 14px 28px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all var(--fast) var(--ease);
      font-size: 13px;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
    }

    .btn:active {
      transform: translateY(1px) scale(.98);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(53, 0, 109, 0.2);
    }

    .btn--primary {
      background: var(--hf-primary);
      color: #fff;
      box-shadow: 0 8px 20px rgba(53, 0, 109, 0.15);
    }

    .btn--primary:hover {
      background: var(--hf-primary-700);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(53, 0, 109, 0.25);
    }

    .btn--secondary {
      background: #fff;
      border-color: var(--hf-primary);
      color: var(--hf-primary);
    }

    .btn--secondary:hover {
      background: #f8f9ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(53, 0, 109, 0.1);
    }

    .btn--ghost {
      background: transparent;
      border-color: transparent;
      color: var(--text);
    }

    .btn--ghost:hover {
      background: var(--surface-2);
    }

    .btn--danger {
      background: #ff3b3b;
      color: var(--hf-white);
    }

    .btn--sm {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .btn--lg {
      padding: 18px 36px;
      border-radius: 14px;
      font-size: 14px;
    }

    .btn[disabled],
    .btn.is-disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .btn .spinner {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(0, 0, 0, .22);
      border-top-color: rgba(0, 0, 0, .0);
      animation: spin .8s linear infinite;
    }

    .btn--primary .spinner,
    .btn--danger .spinner {
      border-color: rgba(241, 242, 246, .55);
      border-top-color: rgba(241, 242, 246, .0);
    }

    [data-theme="dark"] .btn .spinner {
      border-color: rgba(242, 243, 246, .35);
      border-top-color: rgba(242, 243, 246, .0);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
    }

    .badge--primary {
      display: none;
    }

    /* oculto — ver DEUDA_TECNICA.md */
    .badge--accent {
      background: color-mix(in srgb, var(--hf-accent) 18%, var(--surface));
      border-color: color-mix(in srgb, var(--hf-accent) 35%, var(--border));
    }

    .badge--ok {
      display: none;
    }

    /* oculto — ver DEUDA_TECNICA.md */

    /* Fields */
    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: -4px;
    }

    .control {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: box-shadow var(--fast) var(--ease), border-color var(--fast) var(--ease), background var(--fast) var(--ease);
    }

    .control:focus {
      box-shadow: var(--focus);
      border-color: color-mix(in srgb, var(--hf-accent) 40%, var(--border));
    }

    .control:disabled {
      opacity: .55;
      cursor: not-allowed;
      background: var(--surface-2);
    }

    .control.is-error {
      border-color: rgba(255, 59, 59, .6);
      box-shadow: 0 0 0 3px rgba(255, 59, 59, .18);
    }

    .control.is-success {
      border-color: rgba(64, 105, 21, .7);
      box-shadow: 0 0 0 3px rgba(182, 207, 80, .25);
    }

    /* Check / radio */
    .choice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }

    .choice input {
      margin-top: 3px;
    }

    .choice b {
      display: block;
    }

    .choice small {
      color: var(--muted);
    }

    /* Switch */
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .switch__track {
      width: 48px;
      height: 28px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      position: relative;
      transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease);
      cursor: pointer;
    }

    .switch__thumb {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: var(--surface);
      position: absolute;
      top: 2px;
      left: 2px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
      transition: transform var(--fast) var(--ease);
    }

    .switch input {
      display: none;
    }

    .switch input:checked+.switch__track {
      background: color-mix(in srgb, var(--hf-accent) 26%, var(--surface));
      border-color: color-mix(in srgb, var(--hf-accent) 40%, var(--border));
    }

    .switch input:checked+.switch__track .switch__thumb {
      transform: translateX(20px);
    }

    /* Alerts */
    .alert {
      border-radius: var(--r-2);
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 14px 14px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .alert__dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 6px;
      background: var(--hf-accent);
      box-shadow: 0 0 0 4px rgba(117, 138, 253, .18);
    }

    .alert--warn .alert__dot {
      background: var(--hf-primary);
      box-shadow: 0 0 0 4px rgba(255, 94, 50, .18);
    }

    .alert--ok .alert__dot {
      background: var(--hf-green-700);
      box-shadow: 0 0 0 4px rgba(182, 207, 80, .18);
    }

    /* -----------------------------
        5) DROPDOWN / TOOLTIP
      ------------------------------*/
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .menu {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      right: auto;
      width: min(460px, calc(100vw - 24px));
      border: 1px solid color-mix(in srgb, var(--hf-indigo) 10%, var(--border));
      background: var(--surface);
      border-radius: 18px;
      box-shadow: 0 18px 42px rgba(17, 16, 40, .12);
      padding: 12px;
      display: none;
      z-index: 80;
    }

    .menu[aria-hidden="false"] {
      display: block;
    }

    .menu__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .menu a,
    .menu button {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
      min-height: 52px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid color-mix(in srgb, var(--hf-indigo) 8%, var(--border));
      background: color-mix(in srgb, var(--surface) 88%, white);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease), transform var(--fast) var(--ease);
    }

    .menu a::after,
    .menu button::after {
      content: "↗";
      color: var(--hf-indigo);
      font-size: 14px;
      line-height: 1;
      opacity: .7;
    }

    .menu a:hover,
    .menu button:hover {
      background: color-mix(in srgb, var(--hf-indigo) 4%, white);
      border-color: color-mix(in srgb, var(--hf-indigo) 18%, var(--border));
      transform: translateY(-1px);
    }

    .menu hr {
      display: none;
    }

    @media (max-width: 640px) {
      .menu {
        width: min(400px, calc(100vw - 20px));
      }
    }

    @media (max-width: 540px) {
      .menu__grid {
        grid-template-columns: 1fr;
      }
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity var(--fast) var(--ease), transform var(--fast) var(--ease);
      background: var(--text);
      color: var(--bg);
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      max-width: 240px;
      z-index: 90;
    }

    .tooltip.is-on {
      opacity: 1;
      transform: translateY(0);
    }

    /* -----------------------------
        6) TABS / ACCORDION
      ------------------------------*/
    .tabs {
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface);
      overflow: hidden;
    }

    .tabs__list {
      display: flex;
      gap: 6px;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      transition: background var(--fast) var(--ease), color var(--fast) var(--ease), border-color var(--fast) var(--ease);
    }

    .tab[aria-selected="true"] {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .tabs__panel {
      padding: var(--s-5);
      display: none;
    }

    .tabs__panel.is-active {
      display: block;
    }

    .accordion {
      border: 1px solid var(--border);
      border-radius: var(--r-2);
      background: var(--surface);
      overflow: hidden;
    }

    .acc__item+.acc__item {
      border-top: 1px solid var(--border);
    }

    .acc__btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px;
      background: transparent;
      border: 0;
      cursor: pointer;
      font-weight: 900;
    }

    .acc__btn:hover {
      background: var(--surface-2);
    }

    .acc__panel {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows var(--med) var(--ease);
    }

    .acc__panel>div {
      overflow: hidden;
      padding: 0 14px;
    }

    .acc__item[aria-expanded="true"] .acc__panel {
      grid-template-rows: 1fr;
    }

    .acc__item[aria-expanded="true"] .acc__panel>div {
      padding: 0 14px 14px;
    }

    .chev {
      transition: transform var(--med) var(--ease);
    }

    .acc__item[aria-expanded="true"] .chev {
      transform: rotate(180deg);
    }

    /* -----------------------------
        7) MODAL / DRAWER
      ------------------------------*/
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .48);
      z-index: 220;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity var(--med) var(--ease), visibility 0s linear var(--med);
    }

    .overlay.is-on {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--med) var(--ease);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 230;
      padding: var(--s-6);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity var(--med) var(--ease), visibility 0s linear var(--med);
    }

    .modal.is-on {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity var(--med) var(--ease);
    }

    .modal__dialog {
      width: min(720px, 100%);
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: translateY(18px) scale(.985);
      opacity: 0;
      transition: transform calc(var(--med) * 1.1) cubic-bezier(.22, 1, .36, 1), opacity var(--med) var(--ease);
    }

    .modal.is-on .modal__dialog {
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    .modal__hd {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .modal__bd {
      padding: 18px;
    }

    .modal__ft {
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .drawer {
      position: fixed;
      inset: 0;
      display: block;
      z-index: 240;
      visibility: hidden;
      pointer-events: none;
      transition: visibility 0s linear calc(var(--med) * 1.2);
    }

    .drawer.is-on {
      visibility: visible;
      pointer-events: none;
      transition: visibility 0s linear 0s;
    }

    .drawer__panel {
      position: absolute;
      top: 0;
      right: 0;
      height: 100%;
      width: min(420px, 92vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .18);
      transform: translate3d(calc(100% + 12px), 0, 0);
      transition: transform calc(var(--med) * 1.25) cubic-bezier(.22, 1, .36, 1);
      display: flex;
      flex-direction: column;
      will-change: transform;
      pointer-events: auto;
    }

    .drawer.is-on .drawer__panel {
      transform: translate3d(0, 0, 0);
    }

    .drawer__hd {
      padding: 16px 18px 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      border-bottom: 0;
    }

    .drawer__bd {
      padding: 8px 18px 16px;
      overflow: auto;
      flex: 1;
    }

    .drawer__ft {
      padding: 16px 18px;
      border-top: 1px solid var(--border);
    }

    .hf-cart-list {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .hf-cart-item {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .hf-cart-item__media {
      aspect-ratio: 3 / 4;
      background: var(--surface-2);
      overflow: hidden;
      display: block;
    }

    .hf-cart-item__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hf-cart-item__body {
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 7px;
    }

    .hf-cart-item__title {
      color: var(--text);
      font-weight: 850;
      line-height: 1.25;
      text-decoration: none;
    }

    .hf-cart-item__meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .hf-cart-item__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .hf-cart-item__qty {
      display: inline-grid;
      grid-template-columns: 30px 34px 30px;
      align-items: center;
      border: 1px solid var(--border);
      min-height: 32px;
    }

    .hf-cart-item__qty button {
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: var(--hf-primary);
      cursor: pointer;
      font-weight: 900;
    }

    .hf-cart-item__qty span {
      text-align: center;
      font-size: 13px;
      font-weight: 800;
    }

    .hf-cart-item__remove {
      justify-self: start;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .hf-cart-coupons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .hf-cart-coupons button {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
    }

    .hf-cart-coupons span {
      color: var(--muted);
      font-weight: 600;
    }

    .hf-search-state {
      color: var(--muted);
      font-size: 13px;
      padding: 10px 0;
    }

    .hf-search-results {
      display: grid;
      gap: 12px;
    }

    .hf-search-result {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      color: var(--text);
      text-decoration: none;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .hf-search-result__media {
      aspect-ratio: 1;
      background: var(--surface-2);
      overflow: hidden;
      display: block;
    }

    .hf-search-result__media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hf-search-result__body {
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .hf-search-result__body strong,
    .hf-search-result__body small {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hf-search-result__body small {
      color: var(--muted);
      font-size: 12px;
    }

    .hf-search-result__price {
      color: var(--hf-primary);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .drawer--left .drawer__panel {
      left: 0;
      right: auto;
      border-left: 0;
      border-right: 1px solid var(--border);
      transform: translate3d(calc(-100% - 12px), 0, 0);
    }

    .drawer--left.is-on .drawer__panel {
      transform: translate3d(0, 0, 0);
    }

    .menu-drawer__nav {
      display: grid;
      gap: 0;
    }

    .menu-drawer__link {
      font-family: 'ArchivoMenu', var(--font-sans) !important;
      width: 100%;
      text-align: left;
      display: grid;
      gap: 0;
      padding: 16px 0;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition:
        color calc(var(--med) * .75) var(--ease),
        transform calc(var(--med) * .9) cubic-bezier(.22, 1, .36, 1);
      will-change: transform;
    }

    .menu-drawer__link:hover {
      transform: translateX(4px);
      color: var(--hf-primary);
    }

    .menu-drawer__link strong {
      transition: none;
    }

    .menu-drawer__link strong {
      font-family: inherit;
      font-size: 18px;
      font-weight: 500 !important;
      text-transform: uppercase;
      letter-spacing: .04em !important;
      line-height: 1.2;
      color: inherit;
    }

    .menu-drawer__link:last-child {
      border-bottom: 0;
    }

    .menu-drawer__social {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 0 6px;
      margin-top: 18px;
      border-top: 1px solid var(--border);
    }

    .menu-drawer__social a {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--hf-primary);
      text-decoration: none;
    }

    .menu-drawer__social a img {
      width: 100%;
      height: 100%;
      display: block;
      flex: 0 0 auto;
    }

    @media (prefers-reduced-motion: reduce) {

      .overlay,
      .modal,
      .modal__dialog,
      .drawer,
      .drawer__panel,
      .menu-drawer__link {
        transition: none !important;
        animation: none !important;
        transform: none !important;
      }
    }

    /* -----------------------------
        8) TOAST
      ------------------------------*/
    .toasts {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 200;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      width: min(360px, 92vw);
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 12px 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: toastIn var(--med) var(--ease) both;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .toast__dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      margin-top: 6px;
      background: var(--hf-primary);
    }

    .toast--ok .toast__dot {
      background: var(--hf-green-700);
    }

    .toast--info .toast__dot {
      background: var(--hf-accent);
    }

    .toast__x {
      margin-left: auto;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 10px;
    }

    .toast__x:hover {
      background: var(--surface-2);
    }

    /* -----------------------------
        9) ECOMMERCE COMPONENTS
      ------------------------------*/
    .hf-product-item {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 26px rgba(0, 0, 0, .06);
      display: flex;
      flex-direction: column;
    }

    .productMedia {
      aspect-ratio: 4/5;
      background:
        radial-gradient(500px 250px at 20% 20%, rgba(255, 94, 50, .22), transparent 60%),
        radial-gradient(420px 220px at 80% 10%, rgba(117, 138, 253, .18), transparent 60%),
        linear-gradient(135deg, var(--surface-2), var(--surface));
      position: relative;
      overflow: hidden;
    }

    .productMedia img {
      transition: transform var(--med) var(--ease);
    }

    .hf-product-item:hover .productMedia img {
      transform: scale(1.05);
    }

    .productBadges {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .productBody {
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      text-align: center;
    }

    .priceRow {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .price {
      font-weight: 950;
      font-size: 18px;
    }

    .priceOld {
      display: none;
    }

    /* oculto temporalmente — ver DEUDA_TECNICA.md */
    .priceRow .badge--primary {
      display: none;
    }

    /* descuento oculto — ver DEUDA_TECNICA.md */
    .hf-card__price-discount {
      display: none;
    }

    /* descuento oculto — ver DEUDA_TECNICA.md */
    .swatches {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-2);
    }

    .sizeGrid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 850;
      cursor: pointer;
      transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease);
    }

    .chip:hover {
      background: var(--surface-2);
    }

    .chip[aria-pressed="true"] {
      border-color: color-mix(in srgb, var(--hf-primary) 45%, var(--border));
      background: color-mix(in srgb, var(--hf-primary) 14%, var(--surface));
    }

      align-items: center;

      margin-bottom: 0;
      border-top: 1px solid rgba(255, 255, 255, .16);
      border-bottom: 1px solid rgba(255, 255, 255, .16);

      border-right: 0;
      border-radius: 0;
      overflow: hidden;
      color: #f2f4ff;
      background:
        radial-gradient(760px 300px at 0% 0%, rgba(255, 94, 50, .28), transparent 60%),
        radial-gradient(800px 320px at 100% 100%, rgba(117, 138, 253, .28), transparent 60%),

    .footer__top {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;

      margin-inline: auto;

    .footer__brand-title {

      font-weight: 950;
      letter-spacing: -0.02em;
      line-height: .95;
    }

    .footer__brand-copy {
      margin: 10px 0 14px;
      color: rgba(242, 244, 255, .8);
      max-width: 40ch;
    }

    .footer__newsletter {
      display: flex;
      gap: 10px;
    }

    .footer__newsletter .control {
      min-width: 0;
      flex: 1;
      background: rgba(255, 255, 255, .12);
      color: #fff;
      border-color: rgba(255, 255, 255, .2);
    }

      color: rgba(242, 244, 255, .62);
    }

      display: none;
    }

    .footer__trust--hidden {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .footer__trust .chip {
      background: rgba(255, 255, 255, .96);
      color: #111426;
      border-color: rgba(255, 255, 255, .98);
      font-weight: 900;
    }

    .footer__trust .chip:hover {
      background: #ffffff;
      color: #0b0f22;
    }



    .footer__col-title {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #ffffff;
    }

    .footer__links {
      display: grid;
      gap: 10px;
    }

    .footer__links a,
    .footer__links span {
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      line-height: 1.2;
      opacity: 1;
    }

    .footer__links a:hover {
      color: #ffffff;
      opacity: 1;
    }

    .footer__social {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 0px !important;
      padding-top: var(--s-6);
    }

    .footer__social a {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      padding: 0;
    }

    .footer__social a img {
      width: 100%;
      height: 100%;
      display: block;
      flex: 0 0 auto;
    }

    .footer__bottom {
      border-top: 1px solid rgba(255, 255, 255, .16);
      background: rgba(0, 0, 0, .2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 14px var(--page-gutter);
      color: rgba(242, 244, 255, .74);
      font-size: 13px;
      width: 100%;
    }

    .footer__bottom-links {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .footer__bottom-links a {
      color: inherit;
      text-decoration: none;
    }

    .footer__bottom-links a:hover {
      color: #fff;
    }

    .section#patterns {
      padding-bottom: 0 !important;
      margin-bottom: 0 !important;
    }

    .section#patterns>.container {
      padding-bottom: 0 !important;
      margin-bottom: 0 !important;
    }

    main {
      padding-bottom: 0;
      margin-bottom: 0;
    }

    @media (max-width: 820px) {
      .footer__top {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .footer__top {
        grid-template-columns: 1fr;
      }

      .footer__newsletter .control {
        min-width: 0;
      }
    }

    /* Utility */
    .muted {
      color: var(--muted);
    }

    .right {
      margin-left: auto;
    }

    .hide-sm {
      display: inline-flex;
    }

    @media (max-width: 720px) {
      .hide-sm {
        display: none;
      }
    }

    /* Demo anchors */
    .anchor {
      scroll-margin-top: 90px;
    }

    /* Hide scrollbar for slider */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Bounce animation */
    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(10px);
      }
    }

    /* Hover effect on slider cards */
    #fullSlider article:hover img {
      transform: scale(1.05);
    }

    .hf-slider-controls {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .hf-slider-btn {
      width: 56px;
      height: 56px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--text) 16%, transparent);
      background: color-mix(in srgb, var(--surface) 86%, white 14%);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform var(--fast) var(--ease), background var(--fast) var(--ease), border-color var(--fast) var(--ease);
    }

    .hf-slider-btn:hover {
      transform: translateY(-1px);
      background: var(--surface);
      border-color: color-mix(in srgb, var(--text) 26%, transparent);
    }

    .hf-slider-btn svg {
      width: 24px;
      height: 24px;
      stroke-width: 2;
    }

    .hf-product-scroll-shell {
      position: relative;
    }

    .hf-product-scroll-shell>div {
      padding-inline: var(--page-gutter) !important;
    }

    @media (min-width: 1024px) {
      .hf-product-scroll-shell>div {
        padding-inline: 56px !important;
      }

      .hf-categories .container {
        padding-inline: 56px !important;
      }
    }

    .hf-product-scroll-shell .hf-carousel__nav {
        top: 50%;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(11, 11, 15, .10);
        border-radius: 999px;
        background: #fff;
        color: var(--hf-primary);
        box-shadow: 0 10px 26px rgba(0, 0, 0, .14);
        padding: 0;
        transform: translateY(-50%);
      }

      .hf-product-scroll-shell .hf-carousel__nav:hover {
        background: #fff;
        transform: translateY(-50%) scale(1.04);
      }

      .hf-product-scroll-shell .hf-carousel__nav:disabled,
      .hf-product-scroll-shell .hf-carousel__nav.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .hf-product-scroll-shell .hf-carousel__nav--prev {
        left: var(--page-gutter);
      }

      .hf-product-scroll-shell .hf-carousel__nav--next {
        right: var(--page-gutter);
      }

      .hf-product-scroll-shell .hf-carousel__nav svg {
        width: 20px;
        height: 20px;
        stroke-width: 2.6;
      }

      .hf-slider-controls--overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 4;
      }

      .hf-slider-controls--overlay .hf-slider-btn {
        position: absolute;
        top: var(--hf-overlay-top, 180px);
        transform: translateY(-50%);
        pointer-events: auto;
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(2px);
      }

      .hf-slider-controls--overlay .hf-slider-btn:hover {
        transform: translateY(-50%);
        background: #fff;
      }

      .hf-slider-controls--overlay .hf-slider-btn[data-dir="-1"] {
        left: 6px;
      }

      .hf-slider-controls--overlay .hf-slider-btn[data-dir="1"] {
        right: 6px;
      }

      .hf-slider-btn.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      @media (max-width: 768px) {
        .hf-slider-controls--overlay {
          display: none;
        }

        .hf-product-scroll-shell .hf-slider-controls--overlay {
          display: flex;
        }

        .hf-product-scroll-shell .hf-carousel__nav {
          display: flex;
        }
      }

      .hf-pdp-view {
        width: min(100%, 1200px);
        margin: 0 auto;
        padding: 16px var(--page-gutter) 48px;
        background: var(--surface);
        --hf-pdp-sep: var(--border);
        --hf-pdp-sep-w: 0.5px;
      }

      /* Contención general: ningún bloque de la PDP debe superar el ancho de su
         columna. Los carruseles internos (miniaturas, "Compralo con") usan su
         propio overflow-x para el scroll. Evita desbordes a la derecha en
         pantallas chicas (hasta 280px). */
      .hf-pdp-view :where(div, section, p, h1, h2, ul, table) { min-width: 0; }

      @media (min-width: 1024px) {
        .hf-pdp-view {
          display: grid;
          grid-template-columns: minmax(0, 36rem) 1fr;
          grid-template-rows: auto auto;
          column-gap: 2rem;
          row-gap: 0;
          width: calc(100% - 128px);
          max-width: 1200px;
          margin: 0 auto;
          padding-top: 3rem;
          padding-left: 0;
          padding-right: 0;
        }

        .hf-pdp-view__layout {
          grid-column: 1 / -1;
          grid-row: 1;
          grid-template-columns: minmax(0, 36rem) 1fr;
          column-gap: 2rem;
          min-height: var(--hf-pdp-top-band, 44rem);
        }

        .hf-pdp-view__media {
          grid-column: 1;
          grid-row: 1;
        }

        .hf-pdp-view__info {
          grid-column: 2;
          grid-row: 1;
        }

        .hf-pdp-view__details {
          grid-column: 1;
          grid-row: 2;
          height: 28rem;
          margin-top: 42px;
          display: grid;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .hf-pdp-view__details--side {
          grid-column: 2;
          grid-row: 2;
          align-self: start;
        }

        .hf-buy-with {
          grid-column: 2;
          grid-row: 2;
          margin-top: 42px;
          align-self: start;
        }
      }

      .hf-pdp-view__layout {
        display: grid;
        gap: 18px;
      }

      .hf-pdp-view__media {
        display: grid;
        gap: 12px;
        padding-bottom: 14px;
        border-bottom: var(--hf-pdp-sep-w) solid var(--hf-pdp-sep);
      }

      .hf-pdp-view__main {

        overflow: hidden;

      .hf-pdp-view__main img {
        width: 100%;

        opacity: 1;
        transform: scale(1);
        transition: opacity 280ms var(--ease), transform 420ms var(--ease);
        will-change: opacity, transform;
      }

      .hf-pdp-view__main.is-changing img {
        opacity: 0;
        transform: scale(1.018);

      .hf-pdp-view__thumbs {

        padding-bottom: 4px;

        min-width: 0;

        border-radius: 4px;

      .hf-pdp-view__thumb[aria-current="true"] {

      .hf-pdp-view__thumb:hover {

      .hf-pdp-view__thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      @keyframes hfPdpThumbIn {

          transform: translateY(0) scale(1);

      }

      .hf-pdp-view__info {
        display: grid;
        gap: 14px;

      .hf-pdp-view__kicker {

      .hf-set-mobile-card__colors .hf-pdp-view__color {
        flex: 0 0 auto;

        height: 28px;
        min-width: 0;

        height: 100%;

      .hf-set-mobile-carousel .hf-carousel__viewport,

      }

      .hf-sets-mobile-slider .hf-carousel__track {
        display: flex;

      .hf-set-mobile-carousel .hf-carousel__slide,
      .hf-sets-mobile-slider .hf-carousel__slide {
        flex: 0 0 100%;
        min-width: 100%;
      }

      @media (max-width: 1280px) {
        .hf-sets__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));

        .hf-set-desktop-slider__layout {

        }

      @media (max-width: 640px) {
        .hf-section-head {
          grid-template-columns: 1fr auto !important;
        }

        .hf-section-head>div[aria-hidden="true"] {
          display: none;
        }

        .hf-section-head__title {
          text-align: center !important;
        }

        .hf-categories {
          padding: 56px 0;
          padding-top: 0px;
        }

        .hf-categories__head {
          text-align: center;
        }

        .hf-categories .container {
          padding-inline: var(--page-gutter);
        }

        .hf-set-desktop-slider .container {
          padding-inline: var(--page-gutter);
        }

        .hf-categories__grid {
          grid-template-columns: 1fr;
          gap: 10px;
        }

        .hf-category-card {
          height: 200px;
        }

        .hf-category-card__overlay {
          padding: 12px 10px 10px;
        }

        .hf-category-card__title {
          font-size: 22px;
        }

        .hf-category-card__cta {
          font-size: 10px;
          min-height: 22px;
          padding: 3px 8px;
        }

      @media (max-width: 1024px) {
        .hf-sets {
          display: block;
        }

        .hf-sets__grid {
          display: none;
        }

        .hf-sets-mobile-slider {
          display: block;
        }

        .hf-sets__grid {
          grid-template-columns: 1fr;
        }

        .hf-set-desktop-slider {
          display: none;
        }

        }

      .whatsapp-float {
        position: fixed;
        right: 18px;
        bottom: 18px;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #25d366;
        color: #fff;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
        z-index: 260;
        transition: transform var(--fast) var(--ease), box-shadow var(--fast) var(--ease);
      }

      .whatsapp-float:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.26);
      }

      .whatsapp-float img {
        width: 28px;
        height: 28px;
        display: block;
      }

      @media (max-width: 640px) {
        .whatsapp-float {
          right: 14px;
          bottom: 14px;
          width: 52px;
          height: 52px;
        }
      }

      .hf-video-hero__eyebrow {
        display: none;
        align-items: center;
        gap: 12px;
        margin: 0 0 14px;
        padding: 15px 20px;
        color: #fff;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: .04em;
        text-transform: uppercase;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, .22);
        background: rgba(15, 17, 28, .32);
        box-shadow: 0 10px 28px rgba(0, 0, 0, .16);
        backdrop-filter: blur(10px);
        max-width: min(92vw, 860px);
        line-height: 1.35;
      }

      .hf-video-hero__eyebrow::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 999px;
        flex: 0 0 12px;
        background: var(--hf-primary);
        box-shadow: 0 0 0 7px rgba(39, 24, 125, .18);
      }

      @media (max-width: 640px) {
        .hf-video-hero__eyebrow {
          display: inline-flex;
        }

        .hf-video-hero__eyebrow {
          padding: 12px 16px;
          font-size: 13px;
          max-width: calc(100vw - 40px);
        }
      }

      .hf-pdp-look--mobile-only { display: none !important; }

      .hf-pdp-look-desktop-title {
        display: none !important;
      }

      @media (max-width: 1024px) {
        #home-pdp-look,
        #conjuntos-destacados {
          display: none !important;
        }
      }

      @media (min-width: 1024px) {
        .hf-pdp-look-desktop-title {
          display: grid !important;
        }

        #home-pdp-look {
          position: relative;
          padding-inline: 56px !important;
        }

        #conjuntos-mobile-carousel {
          display: none !important;
        }

        #home-pdp-look .hf-pdp-look-carousel {
          position: relative;
          overflow: visible;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__viewport {
          overflow: hidden;
          border-radius: 0;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__track {
          gap: 0 !important;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__slide {
          flex: 0 0 100%;
          min-width: 100%;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__dots {
          display: none !important;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav {
          position: absolute;
          top: 50%;
          z-index: 20;
          display: flex;
          width: 38px;
          height: 38px;
          border: 1px solid rgba(11, 11, 15, .10);
          border-radius: 999px;
          background: #fff;
          color: var(--hf-primary);
          box-shadow: 0 10px 26px rgba(0, 0, 0, .14);
          padding: 0;
          transform: translateY(-50%);
          transition: none;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav:hover {
          background: #fff;
          transform: translateY(-50%) scale(1.04);
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav--prev {
          left: -12px;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav--next {
          right: -12px;
        }

        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav svg {
          width: 20px;
          height: 20px;
          stroke-width: 2.6;
        }
      }

      /* Unified Desktop scale (0.9) for consistent premium dimensions */
      @media (min-width: 1024px) {
        #home-pdp-look .hf-pdp-look {
          padding: 0 !important;
          margin: 0;
          transform: scale(0.9) !important;
          transform-origin: center top !important;
          margin-bottom: -78px !important;
        }
      }

      /* Mobile: volver a los botones grises viejos. Desktop queda blanco. */
      @media (max-width: 767px) {
        .hf-carousel__nav,
        .hf-product-scroll-shell .hf-carousel__nav,
        .hf-set-mobile-carousel .hf-carousel__nav,
        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav {
          width: 24px !important;
          height: 48px !important;
          border: 0 !important;
          border-radius: 0 !important;
          background: rgba(0, 0, 0, 0.48) !important;
          color: #fff !important;
          box-shadow: none !important;
          padding: 0 !important;
        }

        .hf-carousel__nav:hover,
        .hf-product-scroll-shell .hf-carousel__nav:hover,
        .hf-set-mobile-carousel .hf-carousel__nav:hover,
        #home-pdp-look .hf-pdp-look-carousel .hf-carousel__nav:hover {
          background: rgba(0, 0, 0, 0.62) !important;
          transform: translateY(-50%) !important;
        }
      }

      /* Brand Font Overrides */
      .hf-product-item__title,
      .hf-set-desktop-slider__list li,
      .hf-set-desktop-slider__info .small,
      .hf-product-item__body .small,
      .cartMeta b,
      .cartMeta .small {
        font-family: 'BlauerNue', sans-serif !important;
      }

      .menu-drawer__social img,
      .footer__social img {
        width: 32px !important;
        height: 32px !important;
        object-fit: contain;
        display: block;
      }
    </style>
</head>

<body>
  <main id="hfPageBuilderRoot" data-page-src="/design-system/pages/home.json"></main>
  <script src="/design-system/components/marquee/marquee.js?v=20260619"></script>
  <script src="/design-system/components/carousel/carousel.js?v=20260619"></script>
  <script src="/design-system/components/trust-bar/trust-bar.js?v=20260619"></script>
  <script src="/design-system/page-builder.js?v=set-mobile-colors-20260708"></script>
  <script>
    function updateSetMobileCarouselNavTop() {
      var carousel = document.getElementById('setMobileCarousel');
      if (!carousel) return;
      var media = carousel.querySelector('.hf-carousel__slide[aria-hidden="false"] .productMedia') ||
        carousel.querySelector('.productMedia');
      if (!media) return;

      var carouselRect = carousel.getBoundingClientRect();
      var mediaRect = media.getBoundingClientRect();
      carousel.style.setProperty('--set-mobile-carousel-nav-top', ((mediaRect.top - carouselRect.top) + (mediaRect.height / 2)) + 'px');
    }

    function initDataCarousels() {
      if (!window.HFCarousel) return;
      document.querySelectorAll('[data-hf="carousel"]').forEach(function (carousel) {
        if (!carousel._hfCarousel) {
          window.HFCarousel.create(carousel);
        }
      });
      updateSetMobileCarouselNavTop();
    }
    // Expuesta para que el page-builder reinicialice carousels tras inyectar
    // slides dinámicos (ej. Conjuntos destacados).
    window.initDataCarousels = initDataCarousels;

    function initCarousels() {
      document.querySelectorAll('[data-grid-shell]').forEach(function (shell) {
        var grid = shell.querySelector('.hf-product-grid--h-scroll');
        var prevBtn = shell.querySelector('[data-dir="-1"]');
        var nextBtn = shell.querySelector('[data-dir="1"]');
        if (!grid || !prevBtn || !nextBtn) return;
        if (shell.dataset.carouselReady === 'true') return;
        shell.dataset.carouselReady = 'true';

        function getItems() {
          return Array.prototype.slice.call(grid.querySelectorAll('.hf-product-item, .hf-buy-with__card'));
        }

        function getMetrics() {
          var items = getItems();
          var item = items[0];
          var gap = parseFloat(getComputedStyle(grid).gap) || 0;
          var itemWidth = item ? item.getBoundingClientRect().width : 300;
          var unit = itemWidth + gap;
          var visible = unit > 0 ? Math.max(1, Math.round((grid.clientWidth + gap) / unit)) : 1;
          return { items: items, gap: gap, itemWidth: itemWidth, unit: unit, visible: visible };
        }

        function getAlignedScroll(dir) {
          var maxScroll = Math.max(0, grid.scrollWidth - grid.clientWidth);
          var metrics = getMetrics();
          var step = metrics.unit;
          var currentPage = step > 0 ? Math.round(grid.scrollLeft / step) : 0;
          var target = (currentPage + dir) * step;
          return Math.max(0, Math.min(maxScroll, target));
        }

        function updateControls() {
          var maxScroll = Math.max(0, grid.scrollWidth - grid.clientWidth);
          var canScroll = maxScroll > 2;
          var atStart = grid.scrollLeft <= 2;
          var atEnd = grid.scrollLeft >= (maxScroll - 2);

          prevBtn.disabled = atStart;
          nextBtn.classList.toggle('is-hidden', !canScroll || atEnd);
        }

        prevBtn.addEventListener('click', function () {
          grid.scrollTo({ left: getAlignedScroll(-1), behavior: 'smooth' });
        });

        nextBtn.addEventListener('click', function () {
          grid.scrollTo({ left: getAlignedScroll(1), behavior: 'smooth' });
        });

        var rafId = null;
        grid.addEventListener('scroll', function () {
          if (rafId) return;
          rafId = requestAnimationFrame(function () {
            rafId = null;
            updateControls();
          });
        });

        window.addEventListener('resize', function () {
          updateControls();
        });
        updateControls();
      });

      initDataCarousels();
    }

    document.addEventListener('hf:carousel:change', function (event) {
      if (event.target && event.target.id === 'setMobileCarousel') {
        updateSetMobileCarouselNavTop();
      }
    });

    window.addEventListener('resize', function () {
      initDataCarousels();
      updateSetMobileCarouselNavTop();
    });

    // Ejecutar cuando page-builder haya terminado de cargar los componentes
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCarousels);
    } else {
      initCarousels();
    }

    // También ejecutar con delays
    setTimeout(initCarousels, 100);
    setTimeout(initCarousels, 300);
    setTimeout(initCarousels, 800);

    // Exponer para re-cablear sliders inyectados async (ej. "Compralo con").
    window.initCarousels = initCarousels;
  </script>
</body>
</html>
